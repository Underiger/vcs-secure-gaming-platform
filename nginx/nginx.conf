# nginx.conf — 主設定（Raspberry Pi 4 / arm64）
# worker_processes auto：Pi 4 有 4 個 Cortex-A72 核心，nginx 自動調整
# 此檔案掛載為 /etc/nginx/nginx.conf（docker-compose.arm64.yml）

worker_processes auto;
worker_rlimit_nofile 4096;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 512;  # Pi 4 記憶體保守值；每個連線 ~0.5–1 KB
    use epoll;               # Linux epoll 事件模型，高效低耗
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── 日誌格式 ──────────────────────────────────────────────────────────────
    log_format main
        '$remote_addr - $remote_user [$time_local] "$request" '
        '$status $body_bytes_sent "$http_referer" '
        '"$http_user_agent" rt=$request_time '
        'uct=$upstream_connect_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ── 傳輸效能 ──────────────────────────────────────────────────────────────
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout  65;
    keepalive_requests 100;

    # ── 請求緩衝（Pi 4 節省記憶體）────────────────────────────────────────────
    client_body_buffer_size    16k;
    client_header_buffer_size   1k;
    client_max_body_size       10m;
    large_client_header_buffers 4 8k;

    # ── Gzip 壓縮 ─────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   4;
    gzip_proxied      any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── 安全：隱藏 nginx 版本 ─────────────────────────────────────────────────
    server_tokens off;

    # ── 代理共用設定 ──────────────────────────────────────────────────────────
    proxy_buffering    on;
    proxy_buffer_size  4k;
    proxy_buffers      8 4k;

    # ── 載入子設定（rate-limit zones → tls globals → server blocks）────────────
    # 字母順序：ratelimit.conf → site.conf → tls.conf
    # limit_req_zone / ssl_* 均在 http context 定義，對所有 server 生效
    include /etc/nginx/conf.d/*.conf;
}
