# tls.conf — TLS 全域設定（http context）
# 繼承自 M01 設計規格；憑證路徑由 site.conf 的 server block 指定
# 參考：Mozilla SSL Configuration Generator（Intermediate）+ Pi 4 硬體能力

# ── 協定版本 ──────────────────────────────────────────────────────────────────
# 僅允許 TLS 1.2 / 1.3；禁用 SSLv3 / TLS 1.0 / 1.1
ssl_protocols TLSv1.2 TLSv1.3;

# ── Cipher Suites ─────────────────────────────────────────────────────────────
# TLS 1.3 cipher 由 openssl 決定，無需手動設定；
# TLS 1.2 使用 ECDHE 前向保密 + AES-GCM / CHACHA20（AEAD）
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;  # TLS 1.3 client 優先

# ── 橢圓曲線 ──────────────────────────────────────────────────────────────────
ssl_ecdh_curve X25519:prime256v1:secp384r1;

# ── Session Cache（Pi 4 省記憶體：shared cache 10 MB ≈ 4 萬個 session）────────
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;  # 禁用 session ticket，强制使用 session cache（前向保密）

# ── OCSP Stapling（自簽憑證無 OCSP，設定無害但不生效；Let's Encrypt 自動啟用）──
ssl_stapling        on;
ssl_stapling_verify on;
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;
