# site.conf — 虛擬主機設定（Virtual Casino Sandbox）
# HTTP → HTTPS 301 + HTTPS 主機（TLS 終止 + 靜態檔案 + API 反向代理 + WebSocket）
#
# 上游服務：app:3000（Node.js cluster；在 Docker internal 網路內以服務名解析）
# 靜態檔案：
#   /usr/share/nginx/html/player  ← frontend/dist（玩家端 Vue 3 SPA）
#   /usr/share/nginx/html/admin   ← admin-frontend/dist（管理後台 Vue 3 SPA，base=/admin/）

# ── HTTP server：健康檢查 + 301 強制跳轉 HTTPS ────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Docker healthcheck 使用 HTTP（跳過 TLS 驗證問題）
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # 其餘全部跳轉 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server：TLS 終止 + 所有路由 ─────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # ── TLS 憑證（由 scripts/gen-cert.sh 產生；正式上線請換 Let's Encrypt）──────
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # ── 安全標頭（含 CSP；定義見 security-headers.inc）────────────────────────────
    include /etc/nginx/conf.d/security-headers.inc;

    # ── 同時連線數限制（全站；WebSocket 長連線也計入）──────────────────────────
    limit_conn per_ip 50;

    # ── /health（HTTPS 版，給外部監控使用）────────────────────────────────────
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # ── /api/* — 反向代理到 Node.js backend ───────────────────────────────────
    location ^~ /api/ {
        # 一般 API：30 r/s burst=60（瞬間高峰保護）
        limit_req zone=api burst=60 nodelay;

        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # 請求 /api/auth/* 套用更嚴格的速率限制
        # （因 location 無法巢狀套用多 zone，此處以 auth zone 覆蓋整體 /api/ 中的 auth 路徑）
    }

    # /api/auth/* 嚴格限流（防暴力破解）
    location ^~ /api/auth/ {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # /api/admin/* 使用 admin 速率限制
    location ^~ /api/admin/ {
        limit_req zone=admin_api burst=40 nodelay;

        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── /socket.io/ — WebSocket 代理（Socket.IO）─────────────────────────────
    # 前端預設使用 WebSocket transport（M09），避免 long-polling 跨 worker 問題
    location ^~ /socket.io/ {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket 長連線：保持 24 小時（玩家不主動斷線時不超時）
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        # 關閉 buffering 讓 WebSocket frame 即時傳遞
        proxy_buffering    off;
    }

    # ── /admin — 管理後台 SPA（base: /admin/，Vue Router history mode）─────────
    location ^~ /admin {
        alias  /usr/share/nginx/html/admin;
        index  index.html;
        # SPA fallback：/admin/players → 回傳 /admin/index.html
        try_files $uri $uri/ /admin/index.html;

        # 靜態資源長快取（Vite build 含 hash）
        # 注意：alias 用於正則 location 時必須搭配捕獲組，否則 nginx 會把請求
        # 誤判成目錄並 301 補斜線（曾導致 admin 全部 JS/CSS 載入失敗）。
        # root 不受此限制——它直接拼接完整 URI，故改用 root + 不含 /admin 的上層路徑。
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|ico)$ {
            root    /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
            include /etc/nginx/conf.d/security-headers.inc;
        }
    }

    # ── / — 玩家端 SPA（Vue 3，根路徑）────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html/player;
        index index.html;
        # SPA fallback：/slot, /roulette, /profile 等路由回傳 index.html
        try_files $uri $uri/ /index.html;

        # 靜態資源長快取
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|ico)$ {
            root    /usr/share/nginx/html/player;
            expires 1y;
            add_header Cache-Control "public, immutable";
            include /etc/nginx/conf.d/security-headers.inc;
        }
    }
}
