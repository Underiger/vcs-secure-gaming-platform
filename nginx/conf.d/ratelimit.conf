# ratelimit.conf — 全域限流 Zone 定義（http context）
# 繼承自 M01 設計規格（02_TDD §6.4）；site.conf 的 server block 使用 limit_req / limit_conn
#
# 這些 Zone 僅定義記憶體配置與速率，實際套用在 site.conf 的 location block。

# ── 請求速率限制（limit_req_zone）─────────────────────────────────────────────
# 一般 API 路由：30 req/s（burst 交由各 location 指定）
# 10m ≈ 16 萬個 IP 的狀態（每個 IP 狀態 ~64 bytes）
limit_req_zone $binary_remote_addr zone=api:10m       rate=30r/s;

# 登入 / 驗證路由：10 req/min（防暴力破解）
limit_req_zone $binary_remote_addr zone=auth:10m      rate=10r/m;

# Admin API：每秒最多 20 req
limit_req_zone $binary_remote_addr zone=admin_api:5m  rate=20r/s;

# ── 同時連線數限制（limit_conn_zone）─────────────────────────────────────────
# 同一 IP 最多 50 個同時連線（含 WebSocket 長連線，Pi 4 SOCKET_MAX_CONNECTIONS=200）
limit_conn_zone $binary_remote_addr zone=per_ip:10m;

# ── 超速回應 ─────────────────────────────────────────────────────────────────
# 速率觸發時回 429（Too Many Requests），符合 04_API_SPEC §4 錯誤格式
limit_req_status  429;
limit_conn_status 429;
